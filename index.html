<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>부산 초대장</title>
  <meta name="description" content="2026 여름, 부산 2박 3일 초대장" />
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/invite.css" />
</head>
<body class="invite">
  <div class="stage">
    <svg class="stage__wave" viewBox="0 0 600 140" preserveAspectRatio="none" aria-hidden="true">
      <path d="M0,90 C100,40 200,140 300,90 C400,40 500,140 600,90 L600,0 L0,0 Z" fill="#ffb648" />
    </svg>

    <section class="ticket invite-ticket">
      <div class="invite-ticket__head">
        <div>
          <p class="eyebrow">E-TICKET · BUSAN LINE</p>
          <h1>나랑<br />부산갈래?</h1>
          <p class="invite-ticket__sub">2026.08.09(일) — 08.11(화) · 수서 ↔ 부산 · 2박 3일</p>
        </div>
        <span class="stamp">NON-<br />REFUNDABLE</span>
      </div>

      <div class="invite-ticket__fields">
        <div class="field"><span>From</span><strong>수서 SEOUL</strong></div>
        <div class="field"><span>To</span><strong>부산 BUSAN</strong></div>
        <div class="field"><span>Date</span><strong>08.09 — 08.11</strong></div>
        <div class="field"><span>Duration</span><strong>2박 3일</strong></div>
        <div class="field"><span>Passenger</span><strong>강유비, 이윤주</strong></div>
        <div class="field"><span>Class</span><strong>커플석</strong></div>
      </div>

      <div class="invite-ticket__stub">
        <div class="barcode" aria-hidden="true">
          <span style="height:60%"></span><span style="height:100%"></span>
          <span style="height:40%"></span><span style="height:80%"></span>
          <span style="height:55%"></span><span style="height:90%"></span>
          <span style="height:30%"></span><span style="height:70%"></span>
          <span style="height:50%"></span><span style="height:95%"></span>
        </div>
        <div class="stub-actions">
          <button id="cancelBtn" class="btn btn--ghost" type="button">거절</button>
          <button id="acceptBtn" class="btn btn--primary" type="button">수락</button>
        </div>
      </div>
    </section>

    <p class="footnote">SUSEO → BUSAN · SRT · 2026 SUMMER</p>
  </div>

  <div class="dodge-caption" id="dodgeCaption" aria-hidden="true"></div>

  <script src="js/invite.js"></script>
</body>
</html>
