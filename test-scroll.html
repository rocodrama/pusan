<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>스크롤 테스트</title>
  <link rel="stylesheet" href="css/style.css" />
  <style>
    body { margin: 0; padding: 1rem 1rem 90px; font-family: sans-serif; }
    .row { padding: 1.5rem 0; border-bottom: 1px solid #ccc; font-size: 1.2rem; }
    .bar {
      position: fixed;
      left: 0; right: 0; bottom: 0;
      height: 70px;
      background: #222;
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
    }
  </style>
</head>
<body>
  <h1>스크롤 테스트 페이지</h1>
  <p>이 페이지에서도 메인 콘텐츠 위 스와이프가 안 되고 아래 검은 바 위에서만 되면, 원래 사이트 CSS 문제가 아니라 폰/브라우저 자체 이슈예요.</p>
  <div id="rows"></div>
  <nav class="bar">이건 고정 바 (탭바 흉내)</nav>
  <script>
    const wrap = document.getElementById('rows');
    for (let i = 1; i <= 40; i++) {
      const d = document.createElement('div');
      d.className = 'row';
      d.textContent = '줄 ' + i;
      wrap.appendChild(d);
    }
  </script>
</body>
</html>
